<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment - Mastering Irregular Verbs</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .assessment-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .assessment-card {
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        .question-block {
            margin-bottom: 35px;
            padding-bottom: 25px;
            border-bottom: 1px solid #f0f2f5;
        }
        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        /* Grid de Opciones adaptado idéntico a practice.html */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }
        .option-btn {
            background-color: #ffffff;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 500;
            color: #495057;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        .option-btn:hover {
            background-color: #f8f9fa;
            border-color: #ced4da;
        }
        /* UI de Selección activa para el Examen (Estilo azul de practice) */
        .option-btn.selected-exam {
            border-color: #18529D;
            background-color: rgba(24, 82, 157, 0.05);
            color: #18529D;
            font-weight: 600;
        }
        /* Botón de envío */
        .btn-submit-assessment {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 40px auto 0 auto;
            background-color: #28AD56;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .btn-submit-assessment:hover {
            background-color: #21964b;
        }
        /* Banner de Resultados */
        .score-banner {
            display: none;
            background: #ffffff;
            border-left: 5px solid #28AD56;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-top: 40px;
            text-align: center;
        }
        .score-number {
            font-size: 3rem;
            font-weight: 700;
            color: #28AD56;
            margin: 15px 0;
        }
    </style>
</head>
<body>

    <header></header>

    <main class="content-container">
        <section class="assessment-header">
            <h1>Evaluación Final Oficial</h1>
            <p class="subtitle">Demuestra tu dominio global sobre los verbos irregulares. Esta calificación será registrada en tu expediente escolar.</p>
        </section>

        <div id="assessment-card" class="assessment-card">
            <div id="quizContainer"></div>
            <button id="btn-submit-exam" class="btn-submit-assessment">Enviar Evaluación</button>
        </div>

        <section id="scoreBanner" class="score-banner">
            <h2>Resultados del Examen</h2>
            <p id="scoreText" style="font-size: 1.1rem; color: #555;"></p>
            <div id="scoreGrade" class="score-number">0%</div>
            <p id="feedbackText" style="font-weight: 600; font-size: 1.2rem;"></p>
        </section>
    </main>

    <script type="module">
        import { auth, db } from "../js/firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

       import { verbPool } from "../js/vocabulary.js"; 

        let currentUser = null;
        let listaPreguntasDinámicas = [];
        let respuestasSeleccionadasUsuario = {}; // Guarda { qIndex: oIndex }

        // RASTREO DE USUARIO ACTIVO
        onAuthStateChanged(auth, (user) => {
            if (user) currentUser = user;
        });

        // --- GENERADOR AUTOMÁTICO DE EXAMEN (Lógica exacta de practice.html) ---
        function generarAssessmentDesdePool() {
            // 1. Barajar el pool plano completo de verbos
            const verbosBarajados = [...verbPool].sort(() => 0.5 - Math.random());
            
            // 2. Tomamos 10 reactivos aleatorios para la evaluación final
            const seleccionVerbos = verbosBarajados.slice(0, 10);

            // 3. Mapeamos la selección estructurando las opciones
            listaPreguntasDinámicas = seleccionVerbos.map((verbo, index) => {
                const respuestaCorrecta = verbo.past;
                
                // Filtrar distractores del pool general plano
                const otrosVerbos = verbPool.filter(v => v.past !== respuestaCorrecta);
                const distractores = otrosVerbos
                    .sort(() => 0.5 - Math.random())
                    .slice(0, 3)
                    .map(v => v.past);

                // Combinar y barajar opciones de respuesta
                const opcionesOpciones = [respuestaCorrecta, ...distractores].sort(() => 0.5 - Math.random());
                const idxCorrecto = opcionesOpciones.indexOf(respuestaCorrecta);
                
                // Extraer significado e instrucciones contextuales
                const significado = verbo.clue ? verbo.clue.split('/')[0].trim() : verbo.infinitive;
                const oracionContextual = verbo.sentence || `Complete the sentence: "They ________ the exercise perfectly."`;

                return {
                    number: index + 1,
                    question: `${oracionContextual} <br><small style="color: #777;">[Infinitive: <strong>${verbo.infinitive}</strong> - (${significado})]</small>`,
                    options: opcionesOpciones,
                    correctIndex: idxCorrecto
                };
            });
        }

        // --- RENDERIZADO DEL CUESTIONARIO (Estilo botones de grid) ---
        function renderAssessment() {
            const container = document.getElementById('quizContainer');
            if (!container) return;
            container.innerHTML = "";

            listaPreguntasDinámicas.forEach((q, qIndex) => {
                let optionsHTML = "";
                q.options.forEach((opt, oIndex) => {
                    optionsHTML += `
                        <button class="option-btn" data-q="${qIndex}" data-o="${oIndex}">
                            ${opt}
                        </button>
                    `;
                });

                container.innerHTML += `
                    <div class="question-block" id="block-${qIndex}">
                        <div class="question-text">${q.number}. ${q.question}</div>
                        <div class="options-grid">
                            ${optionsHTML}
                        </div>
                    </div>
                `;
            });

            // Asignar los escuchadores de clics a los botones
            container.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    const qIdx = parseInt(this.getAttribute('data-q'));
                    const oIdx = parseInt(this.getAttribute('data-o'));
                    
                    // Almacenar selección del usuario
                    respuestasSeleccionadasUsuario[qIdx] = oIdx;

                    // Cambio visual estético: desmarcar hermanos y marcar el seleccionado
                    const parentGrid = this.parentElement;
                    parentGrid.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected-ui', 'selected-exam'));
                    this.classList.add('selected-exam');
                });
            });
        }

        // Inicializar generación y pintado de elementos
        generarAssessmentDesdePool();
        renderAssessment();

        // --- MANEJO DEL ENVÍO AL FACILITADOR ---
        document.getElementById('btn-submit-exam').addEventListener('click', async () => {
            const totalQuestions = listaPreguntasDinámicas.length;
            
            // Validación preventiva: Verificar si respondió todas las preguntas
            const cantidadRespondidas = Object.keys(respuestasSeleccionadasUsuario).length;
            if (cantidadRespondidas < totalQuestions) {
                alert(`Por favor, responde todas las preguntas antes de enviar. (${cantidadRespondidas}/${totalQuestions} contestadas)`);
                return;
            }

            let correctAnswersCount = 0;

            // Procesar y calificar las respuestas
            listaPreguntasDinámicas.forEach((q, qIndex) => {
                const respuestaUsuario = respuestasSeleccionadasUsuario[qIndex];
                
                // Bloquear los botones para evitar modificaciones posteriores
                const block = document.getElementById(`block-${qIndex}`);
                block.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);

                if (respuestaUsuario === q.correctIndex) {
                    correctAnswersCount++;
                }
            });

            const finalGradePercentage = Math.round((correctAnswersCount / totalQuestions) * 100);

            // Mostrar el panel de retroalimentación
            document.getElementById('scoreText').textContent = `Lograste responder acertadamente ${correctAnswersCount} de ${totalQuestions} enunciados.`;
            
            const gradeElement = document.getElementById('scoreGrade');
            gradeElement.textContent = `${finalGradePercentage}%`;

            const feedbackElement = document.getElementById('feedbackText');
            if (finalGradePercentage === 100) {
                feedbackElement.textContent = "¡Espectacular! Tienes un dominio absoluto de los verbos irregulares. 🌟";
                feedbackElement.style.color = "#28AD56";
                gradeElement.style.color = "#28AD56";
            } else if (finalGradePercentage >= 70) {
                feedbackElement.textContent = "¡Bien hecho! Aprobaste la evaluación de forma satisfactoria. 👍";
                feedbackElement.style.color = "#18529D";
                gradeElement.style.color = "#18529D";
            } else {
                feedbackElement.textContent = "Sigue practicando. Te recomendamos repasar los módulos de estudio y jugar de nuevo. 📚";
                feedbackElement.style.color = "#dc3545";
                gradeElement.style.color = "#dc3545";
            }

            document.getElementById('scoreBanner').style.display = "block";
            document.getElementById('scoreBanner').scrollIntoView({ behavior: 'smooth' });

            // GUARDAR CALIFICACIÓN EN EL NODO COMPATIBLE CON EL DASHBOARD
            if (currentUser) {
                try {
                    const userRef = doc(db, "users", currentUser.uid);
                    await setDoc(userRef, {
                        profile: {
                            name: currentUser.displayName || "Alumno Anónimo",
                            email: currentUser.email
                        },
                        assessment: {
                            score: correctAnswersCount, // Leído por el dashboard como examen.score
                            total: totalQuestions,      // Leído por el dashboard como examen.total
                            updatedAt: new Date().toISOString()
                        }
                    }, { merge: true });

                    console.log("Calificación del examen guardada exitosamente en el expediente.");
                } catch (error) {
                    console.error("Error al reportar el examen final a Firestore:", error);
                }
            }
        });
    </script>
    <script type="module" src="../js/auth-guard.js"></script>
</body>
</html>
