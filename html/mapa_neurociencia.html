<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mapa Neurociencia PRO</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #0f172a;
    font-family: Arial;
    color: white;
}

header {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
}

header img {
    height: 60px;
}

#controls {
    position: absolute;
    top: 10px;
    right: 10px;
}

button {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    background: #38bdf8;
    cursor: pointer;
}

.tooltip {
    position: absolute;
    background: #111;
    padding: 10px;
    border-radius: 8px;
    pointer-events: none;
    opacity: 0;
    font-size: 12px;
}
</style>
</head>

<body>

<header>
<img src="logo_uv.png">
</header>

<div id="controls">
<button onclick="startPresentation()">🎓 Presentación</button>
<button onclick="stopPresentation()">⛔ Detener</button>
</div>

<div class="tooltip" id="tooltip"></div>

<svg width="100%" height="100%"></svg>

<script>

// ================= DATA CON TEORÍA + APA =================
const data = {
name: "Neurociencia Educativa",
info: "Base interdisciplinaria del aprendizaje",
children: [

{
name: "Problema",
info: "Brecha teoría-práctica docente",
cite: "Tokuhama-Espinosa (2011)",
children: [
{
name: "Desconexión",
info: "Falta de formación neurocientífica",
cite: "Howard-Jones (2014)"
},
{
name: "Prácticas tradicionales",
info: "Memorización vs aprendizaje significativo",
cite: "Ausubel (1968)"
}
]
},

{
name: "Datos cualitativos",
info: "Interpretación de significados",
cite: "Denzin & Lincoln (2011)",
children: [
{
name: "Narrativas",
info: "Experiencias docentes",
cite: "Clandinin (2000)"
},
{
name: "Observación",
info: "Conductas y contexto",
cite: "Angrosino (2007)"
}
]
},

{
name: "Neurociencia",
info: "Bases biológicas del aprendizaje",
children: [
{
name: "Plasticidad cerebral",
info: "El cerebro cambia con la experiencia",
cite: "Kolb & Whishaw (2009)"
},
{
name: "Ley de Hebb",
info: "Neuronas que se activan juntas se conectan",
cite: "Hebb (1949)"
},
{
name: "Emoción y aprendizaje",
info: "Influencia del sistema límbico",
cite: "LeDoux (1996)"
}
]
},

{
name: "Análisis",
info: "Interpretación de datos",
children: [
{
name: "Codificación",
info: "Abierta, axial y selectiva",
cite: "Strauss & Corbin (1990)"
},
{
name: "Triangulación",
info: "Validez mediante múltiples fuentes",
cite: "Flick (2004)"
}
]
}

]
};

// ================= SVG RESPONSIVE =================
const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select("svg")
.attr("viewBox", [-width/2, -height/2, width, height]);

const g = svg.append("g");

// ================= ZOOM =================
svg.call(d3.zoom().on("zoom", (event) => {
    g.attr("transform", event.transform);
}));

// ================= TREE =================
const tree = d3.tree().size([2 * Math.PI, Math.min(width, height) / 2 - 100]);

const root = d3.hierarchy(data);

function update() {

const links = tree(root).links();
const nodes = root.descendants();

// LINKS
g.selectAll("path")
.data(links)
.join("path")
.attr("fill", "none")
.attr("stroke", "#555")
.attr("d", d3.linkRadial()
.angle(d => d.x)
.radius(d => d.y)
);

// NODES
const node = g.selectAll("g")
.data(nodes)
.join("g")
.attr("transform", d => `
rotate(${d.x * 180 / Math.PI - 90})
translate(${d.y},0)
`);

node.append("circle")
.attr("r", 6)
.attr("fill", "#38bdf8");

// TOOLTIP
node.on("mouseover", (event, d) => {
const tooltip = document.getElementById("tooltip");
tooltip.style.opacity = 1;
tooltip.innerHTML = `
<b>${d.data.name}</b><br>
${d.data.info || ""}<br>
<i>${d.data.cite || ""}</i>
`;
tooltip.style.left = event.pageX + "px";
tooltip.style.top = event.pageY + "px";
});

node.on("mouseout", () => {
document.getElementById("tooltip").style.opacity = 0;
});

node.append("text")
.attr("dy", "0.31em")
.attr("x", d => d.x < Math.PI ? 10 : -10)
.attr("text-anchor", d => d.x < Math.PI ? "start" : "end")
.attr("transform", d => d.x >= Math.PI ? "rotate(180)" : null)
.text(d => d.data.name);

}

update();

// ================= PRESENTACIÓN =================
let interval;

function startPresentation() {
let nodes = root.descendants();
let i = 0;

interval = setInterval(() => {
if(i >= nodes.length) i = 0;

const d = nodes[i];

g.transition().duration(1000)
.attr("transform", `
translate(${width/2 - Math.cos(d.x - Math.PI/2)*d.y},
${height/2 - Math.sin(d.x - Math.PI/2)*d.y})
scale(1.5)
`);

i++;
}, 2000);
}

function stopPresentation() {
clearInterval(interval);
g.transition().attr("transform", "translate(0,0) scale(1)");
}

</script>

</body>
</html>
