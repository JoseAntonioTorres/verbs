<!DOCTYPE html>
<html lang="en" id="exe-index">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mastering Irregular Verbs</title>

<link rel="stylesheet" href="libs/bootstrap/bootstrap.min.css">
<link rel="stylesheet" href="content/css/base.css">
<link rel="stylesheet" href="theme/content.css">

<style>
  /* Ocultamos el contenido del OVA inicialmente */
  .ova-oculto { display: none !important; }
  
  /* Tu pantalla de bienvenida moderna personalizada */
  #pantalla-bloqueo {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background-color: #f4f4f9;
    font-family: Arial, sans-serif;
    text-align: center;
  }
  .tarjeta-bienvenida {
    background: white;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    max-width: 400px;
  }
  /* Estilizamos un botón personalizado con tus colores institucionales */
  .btn-google {
    background-color: #18529D;
    color: white;
    border: none;
    padding: 12px 24px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 25px;
    cursor: pointer;
    margin-top: 20px;
    transition: background 0.3s;
  }
  .btn-google:hover { background-color: #0f3a73; }
</style>
</head>
<body>

<div id="pantalla-bloqueo">
  <div class="tarjeta-bienvenida">
    <h2>Mastering Irregular Verbs 📚</h2>
    <p>Inicia sesión con tu cuenta de Google para acceder al material didáctico.</p>
    <button class="btn-google" id="btn-login">Iniciar sesión con Google</button>
  </div>
</div>

<div id="contenido-ova" class="ova-oculto">
    <div class="exe-content">
        <h1>Introduction</h1>
        <p>Contenido del OVA disponible...</p>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

  const firebaseConfig = {
  apiKey: "AIzaSyDHKdijIfKanuRnq7X-S1UlhqM5OzJYHfY",
  authDomain: "mastering-irregular-verbs.firebaseapp.com",
  projectId: "mastering-irregular-verbs",
  storageBucket: "mastering-irregular-verbs.firebasestorage.app",
  messagingSenderId: "732781732974",
  appId: "1:732781732974:web:b275bfb760d05f0d72327f",
  measurementId: "G-VRKJ50XKTT"
};

  // Inicializar Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // Elementos del DOM
  const pantallaBloqueo = document.getElementById('pantalla-bloqueo');
  const contenidoOva = document.getElementById('contenido-ova');
  const btnLogin = document.getElementById('btn-login');

  // 3. OBSERVAR EL ESTADO DEL USUARIO (Saber si ya está logueado o no)
  onAuthStateChanged(auth, (user) => {
    if (user) {
      // Si hay usuario: mostramos el OVA y ocultamos la pantalla de login
      pantallaBloqueo.style.display = 'none';
      contenidoOva.classList.remove('ova-oculto');
      console.log("Usuario firmado:", user.email);
    } else {
      // Si no hay usuario: protegemos el contenido
      pantallaBloqueo.style.display = 'flex';
      contenidoOva.classList.add('ova-oculto');
    }
  });

  // 4. ACCIÓN DEL BOTÓN: Disparar la ventana flotante de Google
  btnLogin.addEventListener('click', () => {
    signInWithPopup(auth, provider)
      .then((result) => {
        // Login exitoso
        console.log("Acceso concedido");
      }).catch((error) => {
        console.error("Error en la autenticación:", error.message);
        alert("Hubo un error al conectar con Google. Inténtalo de nuevo.");
      });
  });

  // Exportamos la función de cierre de sesión de forma global por si deseas usarla en tus menús
  window.cerrarSesionFirebase = function() {
    signOut(auth);
  };
</script>
</body>
</html>
